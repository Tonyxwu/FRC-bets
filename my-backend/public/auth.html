<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#161a22">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Sign up / Log in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0d0f14; --card: #161a22; --border: #2a3142; --blue: #3b82f6; --muted: #8b92a5; --text: #e6e9f0; --err: #ef4444; }
    * { box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { width: 100%; max-width: 340px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    .tabs { display: flex; gap: 0; margin-bottom: 20px; }
    .tabs button { flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 6px 6px 0 0; }
    .tabs button:last-child { border-radius: 0 6px 0 0; }
    .tabs button.active { background: var(--card); border-bottom-color: var(--card); }
    .panel { display: none; padding: 0; }
    .panel.active { display: block; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 1rem; margin-bottom: 14px; }
    .err { color: var(--err); font-size: 0.85rem; margin-bottom: 10px; min-height: 20px; }
    button[type="submit"] { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--blue); color: #fff; font-family: inherit; font-weight: 600; font-size: 1rem; cursor: pointer; }
    button[type="submit"]:hover { filter: brightness(1.1); }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .back { display: inline-block; margin-bottom: 16px; }
    body { flex-direction: column; align-items: stretch; overflow: hidden; }
    .auth-body-wrap { display: flex; flex: 1; min-width: 0; min-height: 0; }
    .leaderboard-sidebar {
      flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border);
      padding: 16px; overflow-y: auto; min-height: 0;
    }
    .leaderboard-sidebar h2 { font-size: 0.95rem; margin: 0 0 10px; color: var(--muted); font-weight: 600; }
    .leaderboard-sidebar select { width: 100%; padding: 8px 10px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.85rem; font-family: inherit; cursor: pointer; }
    .leaderboard-list { list-style: none; margin: 0; padding: 0; font-size: 0.85rem; }
    .leaderboard-list li { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); gap: 6px; font-size: 0.8rem; }
    .leaderboard-list li:last-child { border-bottom: none; }
    .leaderboard-list .rank { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 18px; }
    .leaderboard-list .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .leaderboard-list .team { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 28px; text-align: right; }
    .leaderboard-list .balance { color: #22c55e; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }
    .leaderboard-list .you { color: var(--blue); font-weight: 600; }
    #leaderboardResizer { width: 6px; flex-shrink: 0; cursor: col-resize; background: var(--border); transition: background 0.15s; }
    #leaderboardResizer:hover, #leaderboardResizer.dragging { background: var(--blue); }
    .auth-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; min-width: 0; min-height: 0; }
  </style>
</head>
<body>
  <div id="top-bar-placeholder" style="min-height: 52px; background: #161a22; border-bottom: 1px solid #2a3142;"></div>
  <div class="auth-body-wrap">
  <aside class="leaderboard-sidebar" id="leaderboardSidebar">
    <h2>Leaderboard</h2>
    <select id="leaderboardSort"><option value="all">All</option></select>
    <ul class="leaderboard-list" id="leaderboardList"></ul>
  </aside>
  <div id="leaderboardResizer" title="Drag to resize"></div>
  <div class="auth-center">
  <div>
    <a class="back" href="/frontend.html">← Back</a>
    <div class="box">
      <h1>FRC Match Bets</h1>
      <p class="sub">New users get $100 to bet on ongoing matches.</p>
      <div class="tabs">
        <button type="button" id="tabSignup" class="active">Sign up</button>
        <button type="button" id="tabLogin">Log in</button>
      </div>
      <div id="panelSignup" class="panel active">
        <form id="formSignup">
          <div class="err" id="errSignup"></div>
          <label>Username</label>
          <input type="text" name="username" autocomplete="username" required minlength="2">
          <label>Password (min 4 characters)</label>
          <input type="password" name="password" autocomplete="new-password" required minlength="4">
          <label for="signup-team">Team number <span style="color: var(--err);">*</span></label>
          <input id="signup-team" type="text" name="teamNumber" inputmode="numeric" pattern="[0-9]+" placeholder="e.g. 1418" required minlength="1" autocomplete="off" title="Team number is required">
          <button type="submit">Sign up — get $100</button>
        </form>
      </div>
      <div id="panelLogin" class="panel">
        <form id="formLogin">
          <div class="err" id="errLogin"></div>
          <label>Username</label>
          <input type="text" name="username" autocomplete="username" required>
          <label>Password</label>
          <input type="password" name="password" autocomplete="current-password" required>
          <button type="submit">Log in</button>
        </form>
      </div>
    </div>
  </div>
  </div>
  </div>
  <script src="auth.js"></script>
  <script src="topbar.js"></script>
  <script>
    (function () {
      var sidebar = document.getElementById('leaderboardSidebar');
      var resizerEl = document.getElementById('leaderboardResizer');
      var list = document.getElementById('leaderboardList');
      var sort = document.getElementById('leaderboardSort');
      if (sidebar && resizerEl) {
        var STORAGE_KEY = 'authLeaderboardWidth', MIN = 160, MAX = 480, DEFAULT = 220;
        function getW() { var w = localStorage.getItem(STORAGE_KEY); if (w != null) { var n = parseInt(w, 10); if (!isNaN(n) && n >= MIN && n <= MAX) return n; } return DEFAULT; }
        function setW(w) { localStorage.setItem(STORAGE_KEY, String(w)); }
        sidebar.style.width = getW() + 'px';
        resizerEl.addEventListener('mousedown', function (e) {
          e.preventDefault(); resizerEl.classList.add('dragging'); document.body.style.userSelect = 'none';
          var startX = e.clientX, startW = sidebar.offsetWidth;
          function move(e2) { var n = Math.min(MAX, Math.max(MIN, startW + (e2.clientX - startX))); sidebar.style.width = n + 'px'; setW(n); }
          function up() { resizerEl.classList.remove('dragging'); document.body.style.userSelect = ''; document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); }
          document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
        });
      }
      if (list && sort) {
        function load() {
          var user = typeof auth !== 'undefined' ? auth.getUser() : null;
          var url = sort.value === 'team' && user && user.teamNumber ? '/api/leaderboard?team=' + encodeURIComponent(user.teamNumber) : '/api/leaderboard';
          fetch(url).then(function (r) { return r.json(); }).then(function (data) {
            var rows = data.list || [];
            list.innerHTML = rows.length === 0 ? '<li style="color: var(--muted);">No one yet</li>' : rows.map(function (row) {
              var isYou = user && String(user.id) === String(row.id);
              var team = row.teamNumber != null && row.teamNumber !== '' ? row.teamNumber : '—';
              return '<li><span class="rank">#' + row.rank + '</span><span class="name' + (isYou ? ' you' : '') + '">' + (row.username || '—') + (isYou ? ' (you)' : '') + '</span><span class="team">' + team + '</span><span class="balance">$' + Number(row.balance).toFixed(0) + '</span></li>';
            }).join('');
          }).catch(function () { list.innerHTML = '<li style="color: var(--muted);">Could not load</li>'; });
        }
        var user = typeof auth !== 'undefined' ? auth.getUser() : null;
        var opt = document.createElement('option'); opt.value = 'team'; opt.textContent = 'My team';
        if (user && user.teamNumber) sort.appendChild(opt);
        sort.addEventListener('change', load);
        load();
        document.addEventListener('auth-state-changed', load);
      }
    })();
  </script>
  <script>
    const tabSignup = document.getElementById("tabSignup");
    const tabLogin = document.getElementById("tabLogin");
    const panelSignup = document.getElementById("panelSignup");
    const panelLogin = document.getElementById("panelLogin");
    const formSignup = document.getElementById("formSignup");
    const formLogin = document.getElementById("formLogin");
    const errSignup = document.getElementById("errSignup");
    const errLogin = document.getElementById("errLogin");

    function showPanel(signup) {
      panelSignup.classList.toggle("active", signup);
      panelLogin.classList.toggle("active", !signup);
      tabSignup.classList.toggle("active", signup);
      tabLogin.classList.toggle("active", !signup);
      errSignup.textContent = "";
      errLogin.textContent = "";
    }
    tabSignup.onclick = () => showPanel(true);
    tabLogin.onclick = () => showPanel(false);

    formSignup.onsubmit = async (e) => {
      e.preventDefault();
      errSignup.textContent = "";
      const username = formSignup.username.value.trim();
      const password = formSignup.password.value;
      const teamNumber = formSignup.teamNumber && formSignup.teamNumber.value ? formSignup.teamNumber.value.trim() : "";
      if (!teamNumber) {
        errSignup.textContent = "Team number is required.";
        return;
      }
      const res = await fetch("/api/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password, teamNumber }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        errSignup.textContent = data.error || "Sign up failed";
        return;
      }
      auth.setToken(data.token, data.user);
      const next = new URLSearchParams(window.location.search).get("next");
      if (next) {
        try {
          const u = new URL(next);
          if (u.origin === window.location.origin) { window.location.href = next; return; }
        } catch (_) {}
      }
      window.location.href = "/frontend.html";
    };

    formLogin.onsubmit = async (e) => {
      e.preventDefault();
      errLogin.textContent = "";
      const username = formLogin.username.value.trim();
      const password = formLogin.password.value;
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        errLogin.textContent = data.error || "Log in failed";
        return;
      }
      auth.setToken(data.token, data.user);
      const next = new URLSearchParams(window.location.search).get("next");
      if (next) {
        try {
          const u = new URL(next);
          if (u.origin === window.location.origin) { window.location.href = next; return; }
        } catch (_) {}
      }
      window.location.href = "/frontend.html";
    };
  </script>
</body>
</html>
